version: 1

github:
  enabled: true
  owner: SuperJMN
  repo: FIFOCalculator
  token:
    from: env
    name: GITHUB_TOKEN
  packages:
    - project: src/FIFOCalculator.Android/FIFOCalculator.Android.csproj
      formats:
        - type: Apk
          arch:
            - arm64
          signing:
            keystore:
              from: env
              name: ANDROID_KEYSTORE_BASE64
              encoding: base64
            storePassword:
              from: env
              name: ANDROID_SIGNING_STORE_PASS
            keyAlias: android
            keyPassword:
              from: env
              name: ANDROID_SIGNING_KEY_PASS

    - project: src/FIFOCalculator.Desktop/FIFOCalculator.Desktop.csproj
      formats:
        - type: Deb
          arch:
            - x64
        - type: ExeSetup
          arch:
            - x64

nuget:
  enabled: false

githubPages:
  enabled: false
